name: Bug report
description: Report a reproducible defect in Playwright Guard
title: '[bug] '
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to provide a focused reproduction.
  - type: input
    id: guard-version
    attributes:
      label: Playwright Guard version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: playwright-version
    attributes:
      label: Playwright and Node.js versions
      placeholder: '@playwright/test 1.61.1; Node.js 22.22.3'
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Link a repository or paste the smallest fixture and test that reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and report
      description: Remove tokens, cookies, private URLs, and personal data.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues.
          required: true
        - label: This is not a security vulnerability.
          required: true
