name: Feature proposal
description: Propose a focused addition backed by a real use case
title: '[proposal] '
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the repeated Playwright runtime-monitoring problem, not only the desired API.
    validations:
      required: true
  - type: textarea
    id: current-workaround
    attributes:
      label: Current workaround
      description: Show how teams solve it today and what remains unsafe or repetitive.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives and maintenance cost
      description: Include compatibility and false-positive risks.
    validations:
      required: true
